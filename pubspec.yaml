name: tictactoe
description: "Neon Mind Arena – A premium competitive brain-game platform."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  confetti: ^0.8.0
  firebase_core: ^4.5.0
  firebase_database: ^12.1.4
  google_mobile_ads: ^7.0.0
  app_tracking_transparency: ^2.0.6+1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  fonts:
    - family: Orbitron
      fonts:
        - asset: fonts/Orbitron-Regular.ttf
          weight: 400
        - asset: fonts/Orbitron-Medium.ttf
          weight: 500
        - asset: fonts/Orbitron-SemiBold.ttf
          weight: 600
        - asset: fonts/Orbitron-Bold.ttf
          weight: 700
        - asset: fonts/Orbitron-ExtraBold.ttf
          weight: 800
        - asset: fonts/Orbitron-Black.ttf
          weight: 900
